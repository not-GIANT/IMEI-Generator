<svg width="860" height="280" viewBox="0 0 860 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>IMEI Generator Pro - Animated Banner</title>
  <desc>Animated terminal-style banner with scrolling IMEI digits and Luhn validation effect</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#010A05"/>
      <stop offset="100%" stop-color="#000D08"/>
    </linearGradient>

    <!-- Green glow for title -->
    <filter id="greenglow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="scanfilter">
      <feTurbulence type="fractalNoise" baseFrequency="0 0.15" numOctaves="1" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <style>
      /* === Column rain animations === */
      @keyframes rain0  { 0%{transform:translateY(-340px)} 100%{transform:translateY(340px)} }
      @keyframes rain1  { 0%{transform:translateY(-280px)} 100%{transform:translateY(340px)} }
      @keyframes rain2  { 0%{transform:translateY(-310px)} 100%{transform:translateY(340px)} }
      @keyframes rain3  { 0%{transform:translateY(-260px)} 100%{transform:translateY(340px)} }
      @keyframes rain4  { 0%{transform:translateY(-320px)} 100%{transform:translateY(340px)} }
      @keyframes rain5  { 0%{transform:translateY(-300px)} 100%{transform:translateY(340px)} }
      @keyframes rain6  { 0%{transform:translateY(-270px)} 100%{transform:translateY(340px)} }
      @keyframes rain7  { 0%{transform:translateY(-290px)} 100%{transform:translateY(340px)} }
      @keyframes rain8  { 0%{transform:translateY(-330px)} 100%{transform:translateY(340px)} }
      @keyframes rain9  { 0%{transform:translateY(-250px)} 100%{transform:translateY(340px)} }
      @keyframes rain10 { 0%{transform:translateY(-315px)} 100%{transform:translateY(340px)} }
      @keyframes rain11 { 0%{transform:translateY(-285px)} 100%{transform:translateY(340px)} }
      @keyframes rain12 { 0%{transform:translateY(-305px)} 100%{transform:translateY(340px)} }
      @keyframes rain13 { 0%{transform:translateY(-265px)} 100%{transform:translateY(340px)} }
      @keyframes rain14 { 0%{transform:translateY(-325px)} 100%{transform:translateY(340px)} }
      @keyframes rain15 { 0%{transform:translateY(-255px)} 100%{transform:translateY(340px)} }

      /* Luhn scan line sweeping across the IMEI display */
      @keyframes luhnScan {
        0%   { transform: translateX(-320px); opacity: 0; }
        5%   { opacity: 1; }
        90%  { opacity: 0.8; }
        100% { transform: translateX(320px); opacity: 0; }
      }

      /* IMEI digit highlight — cascade left to right */
      @keyframes digitBright {
        0%,100% { fill: #00CC55; opacity: 0.9; }
        50%     { fill: #00FF77; opacity: 1; }
      }
      @keyframes digitValid {
        0%,80%  { fill: #00CC55; }
        85%     { fill: #AAFFCC; }
        100%    { fill: #00CC55; }
      }
      @keyframes checkFlash {
        0%,70%  { opacity: 0; }
        80%     { opacity: 1; fill: #00FF88; }
        100%    { opacity: 0.7; fill: #00CC55; }
      }
      @keyframes titlePulse {
        0%,100% { opacity: 1; }
        50%     { opacity: 0.88; }
      }
      @keyframes subtitleBlink {
        0%,100% { opacity: 0.7; }
        50%     { opacity: 1; }
      }
      @keyframes cursorBlink {
        0%,49%  { opacity: 1; }
        50%,100%{ opacity: 0; }
      }
      @keyframes scanline {
        0%   { transform: translateY(-8px); opacity: 0.07; }
        100% { transform: translateY(280px); opacity: 0.07; }
      }
      @keyframes gridPulse {
        0%,100% { opacity: 0.04; }
        50%     { opacity: 0.07; }
      }

      .col0  { animation: rain0  3.1s linear infinite; }
      .col1  { animation: rain1  2.7s linear infinite 0.4s; }
      .col2  { animation: rain2  3.4s linear infinite 0.8s; }
      .col3  { animation: rain3  2.5s linear infinite 1.2s; }
      .col4  { animation: rain4  3.2s linear infinite 0.2s; }
      .col5  { animation: rain5  2.9s linear infinite 0.7s; }
      .col6  { animation: rain6  2.6s linear infinite 1.5s; }
      .col7  { animation: rain7  3.0s linear infinite 0.9s; }
      .col8  { animation: rain8  3.3s linear infinite 0.3s; }
      .col9  { animation: rain9  2.8s linear infinite 1.1s; }
      .col10 { animation: rain10 3.1s linear infinite 0.6s; }
      .col11 { animation: rain11 2.7s linear infinite 1.4s; }
      .col12 { animation: rain12 3.4s linear infinite 0.1s; }
      .col13 { animation: rain13 2.5s linear infinite 1.8s; }
      .col14 { animation: rain14 3.2s linear infinite 0.5s; }
      .col15 { animation: rain15 2.9s linear infinite 1.0s; }

      .luhn-scan { animation: luhnScan 3.5s ease-in-out infinite 1s; }
      .title-text { animation: titlePulse 4s ease-in-out infinite; }
      .sub-text   { animation: subtitleBlink 3s ease-in-out infinite 0.8s; }
      .cursor     { animation: cursorBlink 1s step-end infinite; }
      .scanline   { animation: scanline 4s linear infinite; }
      .grid-overlay { animation: gridPulse 5s ease-in-out infinite; }

      /* staggered digit animations */
      .d0  { animation: digitValid 3.5s ease-in-out infinite 0.0s; }
      .d1  { animation: digitValid 3.5s ease-in-out infinite 0.2s; }
      .d2  { animation: digitValid 3.5s ease-in-out infinite 0.4s; }
      .d3  { animation: digitValid 3.5s ease-in-out infinite 0.6s; }
      .d4  { animation: digitValid 3.5s ease-in-out infinite 0.8s; }
      .d5  { animation: digitValid 3.5s ease-in-out infinite 1.0s; }
      .d6  { animation: digitValid 3.5s ease-in-out infinite 1.2s; }
      .d7  { animation: digitValid 3.5s ease-in-out infinite 1.4s; }
      .d8  { animation: digitValid 3.5s ease-in-out infinite 1.6s; }
      .d9  { animation: digitValid 3.5s ease-in-out infinite 1.8s; }
      .d10 { animation: digitValid 3.5s ease-in-out infinite 2.0s; }
      .d11 { animation: digitValid 3.5s ease-in-out infinite 2.2s; }
      .d12 { animation: digitValid 3.5s ease-in-out infinite 2.4s; }
      .d13 { animation: digitValid 3.5s ease-in-out infinite 2.6s; }
      .d14_check { animation: checkFlash 3.5s ease-in-out infinite 2.8s; }
    </style>
  </defs>

  <!-- ░░ BACKGROUND ░░ -->
  <rect width="860" height="280" fill="url(#bg)"/>

  <!-- Grid overlay (faint) -->
  <g class="grid-overlay">
    <!-- vertical lines -->
    <line x1="86"  y1="0" x2="86"  y2="280" stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
    <line x1="172" y1="0" x2="172" y2="280" stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
    <line x1="258" y1="0" x2="258" y2="280" stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
    <line x1="344" y1="0" x2="344" y2="280" stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
    <line x1="430" y1="0" x2="430" y2="280" stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
    <line x1="516" y1="0" x2="516" y2="280" stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
    <line x1="602" y1="0" x2="602" y2="280" stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
    <line x1="688" y1="0" x2="688" y2="280" stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
    <line x1="774" y1="0" x2="774" y2="280" stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
    <!-- horizontal lines -->
    <line x1="0" y1="56"  x2="860" y2="56"  stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
    <line x1="0" y1="112" x2="860" y2="112" stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
    <line x1="0" y1="168" x2="860" y2="168" stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
    <line x1="0" y1="224" x2="860" y2="224" stroke="#00FF55" stroke-width="0.3" opacity="0.04"/>
  </g>

  <!-- ░░ MATRIX RAIN COLUMNS ░░ -->
  <!-- Each column: a group of digit text elements that scroll down -->
  <!-- Col spacing: 860/16 = ~54px; columns fade near center to not obstruct title -->

  <!-- LEFT BANK (cols 0-5) -->
  <g opacity="0.22" font-family="'Courier New',monospace" font-size="13" fill="#00FF55">
    <g class="col0" style="transform-origin:27px 0">
      <text x="27" y="0">3</text><text x="27" y="18">5</text><text x="27" y="36">6</text>
      <text x="27" y="54">9</text><text x="27" y="72">3</text><text x="27" y="90">8</text>
      <text x="27" y="108">0</text><text x="27" y="126">1</text><text x="27" y="144">4</text>
      <text x="27" y="162">7</text><text x="27" y="180">2</text><text x="27" y="198">9</text>
      <text x="27" y="216">5</text><text x="27" y="234">1</text><text x="27" y="252">6</text><text x="27" y="270">3</text>
    </g>
    <g class="col1" style="transform-origin:81px 0">
      <text x="81" y="0">8</text><text x="81" y="18">7</text><text x="81" y="36">2</text>
      <text x="81" y="54">4</text><text x="81" y="72">0</text><text x="81" y="90">6</text>
      <text x="81" y="108">1</text><text x="81" y="126">9</text><text x="81" y="144">3</text>
      <text x="81" y="162">5</text><text x="81" y="180">8</text><text x="81" y="198">2</text>
      <text x="81" y="216">7</text><text x="81" y="234">4</text><text x="81" y="252">0</text><text x="81" y="270">6</text>
    </g>
    <g class="col2" style="transform-origin:135px 0" opacity="0.7">
      <text x="135" y="0">1</text><text x="135" y="18">4</text><text x="135" y="36">9</text>
      <text x="135" y="54">2</text><text x="135" y="72">6</text><text x="135" y="90">8</text>
      <text x="135" y="108">5</text><text x="135" y="126">3</text><text x="135" y="144">7</text>
      <text x="135" y="162">0</text><text x="135" y="180">4</text><text x="135" y="198">1</text>
      <text x="135" y="216">9</text><text x="135" y="234">2</text><text x="135" y="252">6</text><text x="135" y="270">8</text>
    </g>
    <g class="col3" style="transform-origin:189px 0" opacity="0.45">
      <text x="189" y="0">5</text><text x="189" y="18">0</text><text x="189" y="36">7</text>
      <text x="189" y="54">3</text><text x="189" y="72">9</text><text x="189" y="90">1</text>
      <text x="189" y="108">4</text><text x="189" y="126">8</text><text x="189" y="144">6</text>
      <text x="189" y="162">2</text><text x="189" y="180">5</text><text x="189" y="198">0</text>
      <text x="189" y="216">7</text><text x="189" y="234">3</text><text x="189" y="252">9</text><text x="189" y="270">1</text>
    </g>
    <g class="col4" style="transform-origin:243px 0" opacity="0.2">
      <text x="243" y="0">2</text><text x="243" y="18">8</text><text x="243" y="36">5</text>
      <text x="243" y="54">1</text><text x="243" y="72">7</text><text x="243" y="90">4</text>
      <text x="243" y="108">9</text><text x="243" y="126">0</text><text x="243" y="144">3</text>
      <text x="243" y="162">6</text><text x="243" y="180">2</text><text x="243" y="198">8</text>
      <text x="243" y="216">5</text><text x="243" y="234">1</text><text x="243" y="252">7</text><text x="243" y="270">4</text>
    </g>
    <g class="col5" style="transform-origin:297px 0" opacity="0.07">
      <text x="297" y="0">6</text><text x="297" y="18">3</text><text x="297" y="36">0</text>
      <text x="297" y="54">8</text><text x="297" y="72">4</text><text x="297" y="90">2</text>
      <text x="297" y="108">7</text><text x="297" y="126">5</text><text x="297" y="144">1</text>
      <text x="297" y="162">9</text><text x="297" y="180">6</text><text x="297" y="198">3</text>
      <text x="297" y="216">0</text><text x="297" y="234">8</text><text x="297" y="252">4</text><text x="297" y="270">2</text>
    </g>
  </g>

  <!-- RIGHT BANK (cols 10-15, mirrored fade) -->
  <g opacity="0.22" font-family="'Courier New',monospace" font-size="13" fill="#00FF55">
    <g class="col10" style="transform-origin:563px 0" opacity="0.07">
      <text x="563" y="0">4</text><text x="563" y="18">9</text><text x="563" y="36">2</text>
      <text x="563" y="54">7</text><text x="563" y="72">0</text><text x="563" y="90">5</text>
      <text x="563" y="108">3</text><text x="563" y="126">8</text><text x="563" y="144">6</text>
      <text x="563" y="162">1</text><text x="563" y="180">4</text><text x="563" y="198">9</text>
      <text x="563" y="216">2</text><text x="563" y="234">7</text><text x="563" y="252">0</text><text x="563" y="270">5</text>
    </g>
    <g class="col11" style="transform-origin:617px 0" opacity="0.2">
      <text x="617" y="0">7</text><text x="617" y="18">1</text><text x="617" y="36">6</text>
      <text x="617" y="54">3</text><text x="617" y="72">8</text><text x="617" y="90">5</text>
      <text x="617" y="108">0</text><text x="617" y="126">2</text><text x="617" y="144">9</text>
      <text x="617" y="162">4</text><text x="617" y="180">7</text><text x="617" y="198">1</text>
      <text x="617" y="216">6</text><text x="617" y="234">3</text><text x="617" y="252">8</text><text x="617" y="270">5</text>
    </g>
    <g class="col12" style="transform-origin:671px 0" opacity="0.45">
      <text x="671" y="0">0</text><text x="671" y="18">5</text><text x="671" y="36">3</text>
      <text x="671" y="54">9</text><text x="671" y="72">2</text><text x="671" y="90">7</text>
      <text x="671" y="108">4</text><text x="671" y="126">1</text><text x="671" y="144">8</text>
      <text x="671" y="162">6</text><text x="671" y="180">0</text><text x="671" y="198">5</text>
      <text x="671" y="216">3</text><text x="671" y="234">9</text><text x="671" y="252">2</text><text x="671" y="270">7</text>
    </g>
    <g class="col13" style="transform-origin:725px 0" opacity="0.7">
      <text x="725" y="0">9</text><text x="725" y="18">6</text><text x="725" y="36">1</text>
      <text x="725" y="54">4</text><text x="725" y="72">8</text><text x="725" y="90">0</text>
      <text x="725" y="108">7</text><text x="725" y="126">3</text><text x="725" y="144">5</text>
      <text x="725" y="162">2</text><text x="725" y="180">9</text><text x="725" y="198">6</text>
      <text x="725" y="216">1</text><text x="725" y="234">4</text><text x="725" y="252">8</text><text x="725" y="270">0</text>
    </g>
    <g class="col14" style="transform-origin:779px 0">
      <text x="779" y="0">2</text><text x="779" y="18">4</text><text x="779" y="36">8</text>
      <text x="779" y="54">6</text><text x="779" y="72">1</text><text x="779" y="90">9</text>
      <text x="779" y="108">3</text><text x="779" y="126">7</text><text x="779" y="144">0</text>
      <text x="779" y="162">5</text><text x="779" y="180">2</text><text x="779" y="198">4</text>
      <text x="779" y="216">8</text><text x="779" y="234">6</text><text x="779" y="252">1</text><text x="779" y="270">9</text>
    </g>
    <g class="col15" style="transform-origin:833px 0">
      <text x="833" y="0">5</text><text x="833" y="18">3</text><text x="833" y="36">7</text>
      <text x="833" y="54">0</text><text x="833" y="72">4</text><text x="833" y="90">6</text>
      <text x="833" y="108">2</text><text x="833" y="126">8</text><text x="833" y="144">1</text>
      <text x="833" y="162">9</text><text x="833" y="180">5</text><text x="833" y="198">3</text>
      <text x="833" y="216">7</text><text x="833" y="234">0</text><text x="833" y="252">4</text><text x="833" y="270">6</text>
    </g>
  </g>

  <!-- ░░ SCANLINE ░░ -->
  <rect class="scanline" width="860" height="3" fill="#00FF55" opacity="0.07"/>

  <!-- ░░ CENTER CONTENT ░░ -->

  <!-- Title -->
  <text class="title-text"
    x="430" y="88"
    font-family="'Courier New', Courier, monospace"
    font-weight="700"
    font-size="52"
    text-anchor="middle"
    letter-spacing="6"
    fill="#00EE55"
    filter="url(#greenglow)">IMEI GENERATOR</text>

  <!-- Subtitle -->
  <text class="sub-text"
    x="430" y="117"
    font-family="'Courier New', Courier, monospace"
    font-weight="400"
    font-size="12"
    text-anchor="middle"
    letter-spacing="3"
    fill="#00AA44"
    opacity="0.85">GENERATE  ·  VALIDATE  ·  EXPORT  ·  LUHN VERIFIED</text>

  <!-- ── IMEI display row ── -->
  <!-- Label -->
  <text x="208" y="158"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#007733" letter-spacing="1">OUTPUT://</text>

  <!-- The 15-digit IMEI: 3 5 6 9 3 8 0 3 1 4 2 7 9 5 [check] -->
  <!-- Each digit in its own animated span, staggered -->
  <g font-family="'Courier New', Courier, monospace" font-size="20" font-weight="700" text-anchor="middle">
    <text class="d0"  x="222" y="185" fill="#00CC55">3</text>
    <text class="d1"  x="244" y="185" fill="#00CC55">5</text>
    <text class="d2"  x="266" y="185" fill="#00CC55">6</text>
    <text class="d3"  x="288" y="185" fill="#00CC55">9</text>
    <!-- separator -->
    <text x="302" y="185" fill="#005522" font-size="14">-</text>
    <text class="d4"  x="316" y="185" fill="#00CC55">3</text>
    <text class="d5"  x="338" y="185" fill="#00CC55">8</text>
    <text class="d6"  x="360" y="185" fill="#00CC55">0</text>
    <text class="d7"  x="382" y="185" fill="#00CC55">3</text>
    <!-- separator -->
    <text x="396" y="185" fill="#005522" font-size="14">-</text>
    <text class="d8"  x="410" y="185" fill="#00CC55">1</text>
    <text class="d9"  x="432" y="185" fill="#00CC55">4</text>
    <text class="d10" x="454" y="185" fill="#00CC55">2</text>
    <text class="d11" x="476" y="185" fill="#00CC55">7</text>
    <text class="d12" x="498" y="185" fill="#00CC55">9</text>
    <text class="d13" x="520" y="185" fill="#00CC55">5</text>
    <!-- separator -->
    <text x="534" y="185" fill="#005522" font-size="14">-</text>
    <!-- Luhn check digit (flashes brighter when "validated") -->
    <text class="d14_check" x="552" y="185" fill="#00CC55">7</text>
  </g>

  <!-- Luhn scan line sweeping over digits -->
  <g class="luhn-scan" style="transform-origin:430px 175px">
    <rect x="430" y="163" width="3" height="28" fill="#00FF88" opacity="0.9" rx="1"/>
    <rect x="430" y="163" width="3" height="28" fill="#00FF88" opacity="0.25" rx="1"
          filter="url(#softglow)"/>
  </g>

  <!-- VALID badge (appears bottom right of IMEI) -->
  <rect x="570" y="170" width="62" height="22" rx="4" fill="none" stroke="#00AA44" stroke-width="0.8" opacity="0.6"/>
  <text x="601" y="185"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#00CC55" text-anchor="middle"
    letter-spacing="1">✓ VALID</text>

  <!-- Cursor blink after IMEI -->
  <text class="cursor" x="650" y="185"
    font-family="'Courier New', Courier, monospace"
    font-size="20" font-weight="700" fill="#00FF55">_</text>

  <!-- ░░ BOTTOM BAR ░░ -->
  <rect x="0" y="250" width="860" height="30" fill="#000A04" opacity="0.85"/>
  <!-- bottom separator line -->
  <line x1="0" y1="250" x2="860" y2="250" stroke="#00AA44" stroke-width="0.5" opacity="0.4"/>

  <text x="430" y="269"
    font-family="'Courier New', Courier, monospace"
    font-size="10" text-anchor="middle"
    letter-spacing="2"
    fill="#006622" opacity="0.9">PYTHON · TKINTER · LUHN ISO/IEC 7812-1 · BATCH EXPORT · MULTI-THEME</text>

  <!-- ░░ HUD CORNERS ░░ -->
  <g stroke="#00AA33" stroke-width="1.2" fill="none" opacity="0.5">
    <path d="M10,10 L10,32 M10,10 L32,10"/>
    <path d="M850,10 L850,32 M850,10 L828,10"/>
    <path d="M10,270 L10,248 M10,270 L32,270"/>
    <path d="M850,270 L850,248 M850,270 L828,270"/>
  </g>

  <!-- Top-left label -->
  <text x="40" y="24"
    font-family="'Courier New', Courier, monospace"
    font-size="9" fill="#005520" letter-spacing="1" opacity="0.7">SYS://IMEI_TOOL v2.0</text>

